name: cv_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase & Backend
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.6 
  
  # State Management & Storage
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  
  # Utilities
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  google_sign_in: ^6.2.1

  # PDF & Printing
  pdf: ^3.10.7
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: "^0.14.4"

# إعدادات أيقونة التطبيق (تمت إضافتها هنا)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/templates/
    - assets/icon/icon.png 